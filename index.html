<!DOCTYPE html>
<html>
<head>
<title>SecureScan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
border:none;
border-radius:15px;
}

.btn-scan{
background:#22c55e;
border:none;
}

.result{
padding:12px;
border-radius:10px;
margin:8px 0;
background:#334155;
}

.title{
font-size:40px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container py-5">

<div class="text-center mb-5">
<div class="title">🛡️ SecureScan</div>
<p>Web Vulnerability Scanner</p>
</div>

<div class="card p-4">

<form method="POST">

<div class="input-group">

<input
type="text"
name="url"
class="form-control"
placeholder="Enter website URL">

<button class="btn btn-scan">
Scan
</button>

</div>

</form>

</div>

{% if result %}

<div class="mt-4">

<h3>Scan Results</h3>

{% for r in result %}

<div class="result">
{{ r }}
</div>

{% endfor %}

</div>

{% endif %}

<div class="text-center mt-5">

<a href="/history" class="btn btn-outline-light">
📁 View History
</a>

</div>

</div>

</body>
</html>
